# ─── Lab Oven Booking System ──────────────────────────────────────────
# Docker Compose service block for the web-oven app.
# Connects to the existing x01_db PostgreSQL container via the
# external network x01-bot_x01_net.
#
# USAGE:
#   docker compose up -d --build
#
# PRE-REQUISITE: Create the database and user in x01_db first.
# See README.md for the one-time SQL setup.
# ──────────────────────────────────────────────────────────────────────

services:
  web-oven-ap-lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-oven-ap-lab
    restart: unless-stopped
    ports:
      - "3006:3000"
    environment:
      - DATABASE_URL=postgresql://oven_user:x154@x01_db:5432/ap_lab_db
      - NEXTAUTH_URL=https://ap-lab.g-labs.my.id
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-pQVq8zaXw69TMcXKIe+grxUI77FmaXnZb66G6jvY5ZU=}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@g-labs.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - ADMIN_NAME=${ADMIN_NAME:-Gerald}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_EMAIL_FROM=${RESEND_EMAIL_FROM}
      - TZ=Asia/Jakarta
      - PGTZ=Asia/Jakarta
      - XRD_COMPUTE_URL=http://xrd-compute:8000
      - REDIS_URL=redis://xrd-redis:6379
      - MINIO_ENDPOINT=xrd-minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=xrd-files
      - MINIO_USE_SSL=false
    networks:
      - x01_net

  xrd-redis:
    image: redis:7-alpine
    container_name: xrd-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    networks:
      - x01_net

  xrd-minio:
    image: minio/minio:latest
    container_name: xrd-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./data/minio:/data
    networks:
      - x01_net

  xrd-compute:
    build: ./services/xrd-compute
    container_name: xrd-compute
    restart: unless-stopped
    environment:
      - WORKERS=3
    networks:
      - x01_net

networks:
  x01_net:
    external: true
    name: x01-bot_x01_net
